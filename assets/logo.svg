<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 88" width="400" height="88">
  <defs>
    <linearGradient id="cnArc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#047857"/>
      <stop offset="1" stop-color="#0BB985"/>
    </linearGradient>
  </defs>
  <!-- 심볼: 나인(9) — 코어를 품은 링 + 라임 꼬리 -->
  <g transform="translate(44,38)">
    <!-- 9의 몸통: 링 -->
    <circle r="21" fill="none" stroke="url(#cnArc)" stroke-width="11"/>
    <!-- 9의 꼬리: 링 오른쪽에서 내려오는 라임 스트로크 -->
    <path d="M 21 2 L 21 26" fill="none" stroke="#C9F24E" stroke-width="11" stroke-linecap="round"/>
    <!-- 코어 -->
    <circle r="9" fill="#0D1B2A"/>
  </g>
  <!-- 워드마크: Core(라이트) Nine(볼드) 대비 -->
  <text x="92" y="57" font-family="'Pretendard Variable',Pretendard,-apple-system,sans-serif"
        font-size="36" letter-spacing="-1.2" fill="#0D1B2A"
        font-weight="500">Core<tspan font-weight="800">Nine</tspan></text>
  <text x="283" y="57" font-family="'Pretendard Variable',Pretendard,-apple-system,sans-serif"
        font-size="36" letter-spacing="-0.5" font-weight="800" fill="#0BA678"> AI</text>
</svg>

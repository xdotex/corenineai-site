<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과정 상세 — CoreNine AI</title>
<meta name="description" content="직무별 AI 실무 교육 과정 상세 — 커리큘럼, 실습 산출물, 진행 방식 안내.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="CoreNine AI">
<meta property="og:title" content="과정 상세 — CoreNine AI">
<meta property="og:description" content="직무별 AI 실무 교육 과정 상세 — 커리큘럼, 실습 산출물, 진행 방식 안내.">
<meta property="og:url" content="https://corenineai.com/course.html">
<meta property="og:image" content="https://corenineai.com/assets/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="assets/style.css">
<style>
  /* 상단 4분할 (산업군 | 시간 | 난이도 | 목표) */
  .spec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:44px}
  .spec{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px 22px;box-shadow:var(--shadow-sm)}
  .spec .k{font-size:12px;font-weight:800;letter-spacing:.08em;color:var(--brand-strong)}
  .spec .v{margin-top:10px;font-size:15.5px;font-weight:700;line-height:1.65}
  .spec.goal{grid-column:span 4;background:var(--brand-softer);border-color:var(--brand-line)}
  .spec.goal .v{font-size:17px}

  .tools-line{margin-top:24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .tools-line .lbl{font-size:13px;font-weight:800;color:var(--mute);margin-right:4px}

  /* 커리큘럼 표 */
  .curri-note{margin-top:14px;font-size:13px;color:var(--mute)}
  td.subj{font-weight:800;white-space:nowrap}
  td.hrs{font-weight:800;color:var(--brand-strong);white-space:nowrap;text-align:center}
  ul.pts{list-style:none}
  ul.pts li{padding:3px 0 3px 18px;position:relative;font-size:14px;color:var(--sub)}
  ul.pts li::before{content:"";position:absolute;left:0;top:12px;width:10px;height:2.5px;border-radius:2px;background:var(--brand)}

  /* 기대 결과물 */
  .out-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px}
  .out{background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px 26px;box-shadow:var(--shadow-sm)}
  .out .no{display:inline-flex;width:34px;height:34px;border-radius:10px;background:var(--brand-soft);
    color:var(--brand-strong);font-weight:800;font-size:14px;align-items:center;justify-content:center}
  .out b{display:block;margin-top:14px;font-size:15.5px;line-height:1.6}

  /* 다른 과정 */
  .more-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:40px}
  .mini{border:1px solid var(--line);border-radius:16px;background:#fff;padding:22px;
    text-decoration:none;color:var(--ink);box-shadow:var(--shadow-sm);transition:transform .18s,box-shadow .18s}
  .mini:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
  .mini .cat{font-size:12px;font-weight:800;color:var(--brand-strong)}
  .mini h5{margin-top:8px;font-size:15.5px;font-weight:800;line-height:1.5}
  .mini .m{margin-top:10px;font-size:12.5px;color:var(--mute)}

  .apply-band{margin-top:64px;background:linear-gradient(120deg,var(--brand-softer),#EAF6FF);
    border:1px solid var(--brand-line);border-radius:22px;padding:40px 44px;
    display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
  .apply-band h3{font-size:21px;font-weight:800;line-height:1.5}
  .apply-band p{margin-top:8px;color:var(--sub);font-size:14.5px;line-height:1.8}

  @media (max-width:960px){
    .spec-grid{grid-template-columns:1fr 1fr}
    .spec.goal{grid-column:span 2}
    .out-grid,.more-grid{grid-template-columns:1fr}
    .apply-band{grid-template-columns:1fr;padding:30px 26px}
  }
</style>
</head>
<body data-page="courses">

<header class="page-hero">
  <div class="wrap">
    <div class="crumb"><a href="index.html">홈</a> / <a href="courses.html">교육 과정</a> / <span id="crumbTitle"></span></div>
    <div id="heroBadges" style="display:flex;gap:8px;margin-bottom:16px;position:relative"></div>
    <h1 id="cTitle"></h1>
    <p class="lede" id="cTagline"></p>
  </div>
</header>

<section style="padding-top:24px">
  <div class="wrap">
    <div class="spec-grid stagger" id="specGrid"></div>
    <div class="tools-line" id="toolsLine"></div>
  </div>
</section>

<section class="sec-soft">
  <div class="wrap">
    <div class="eyebrow">커리큘럼</div>
    <h2 class="title">과목 · 주요 내용 · 시수</h2>
    <p class="title-desc">모든 항목은 "듣고 이해한다"가 아니라 <b>"직접 해낸다"</b>로 서술됩니다 —
    그것이 실습 중심 과정의 약속입니다.</p>
    <div class="table-scroll reveal" style="margin-top:40px">
      <table class="doc" id="curriTable"></table>
    </div>
    <p class="curri-note">※ 표준 커리큘럼입니다. 진단 미팅에서 귀사의 실제 업무·데이터에 맞춰 과목과 실습 과제가 조정됩니다.</p>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="eyebrow">기대 결과물</div>
    <h2 class="title">교육이 끝나면 <span class="accent">손에 남는 것</span></h2>
    <div class="out-grid stagger" id="outGrid"></div>
  </div>
</section>

<section class="tight" style="padding-top:0">
  <div class="wrap">
    <div class="apply-band reveal">
      <div>
        <h3>이 과정, 우리 팀에 맞을까요?</h3>
        <p>대상 인원과 직군 구성을 알려주시면 편성안과 기준 견적을 함께 안내드립니다.
        고용보험 환급 적용 가능 여부도 확인해 드립니다.</p>
      </div>
      <a class="btn primary" id="applyBtn" href="contact.html">이 과정 문의하기</a>
    </div>

    <div style="margin-top:72px">
      <h2 class="title" style="font-size:24px">함께 보는 과정</h2>
      <div class="more-grid" id="moreGrid"></div>
    </div>
  </div>
</section>

<script src="assets/courses.js"></script>
<script src="assets/site.js"></script>
<script>
  function renderCourse() {
    const id = location.hash.replace('#', '') || 'worker-standard';
    const c = courseById(id) || courseById('worker-standard');
    document.title = c.title + ' — CoreNine AI';

    document.getElementById('crumbTitle').textContent = c.title;
    document.getElementById('heroBadges').innerHTML =
      `<span class="chip mint">${CATS[c.cat]}</span><span class="badge-level l${c.level}">${LEVELS[c.level]}</span>`;
    document.getElementById('cTitle').textContent = c.title;
    document.getElementById('cTagline').textContent = c.tagline;

    document.getElementById('specGrid').innerHTML = `
      <div class="spec"><div class="k">권장 대상</div><div class="v">${c.industry}</div></div>
      <div class="spec"><div class="k">교육 시간</div><div class="v">${c.hours}</div></div>
      <div class="spec"><div class="k">난이도</div><div class="v">${LEVELS[c.level]} (Level ${c.level})</div></div>
      <div class="spec"><div class="k">운영 방식</div><div class="v">방문 집합 교육 · 실습 중심</div></div>
      <div class="spec goal"><div class="k">교육 목표</div><div class="v">${c.goal}</div></div>`;

    document.getElementById('toolsLine').innerHTML =
      `<span class="lbl">다루는 도구</span>` + c.tools.map(t => `<span class="chip">${t}</span>`).join('');

    document.getElementById('curriTable').innerHTML =
      `<tr><th style="width:22%">과목</th><th>주요 내용</th><th style="width:9%;text-align:center">시수</th></tr>` +
      c.curriculum.map(m => `
        <tr>
          <td class="subj">${m.subject}</td>
          <td><ul class="pts">${m.points.map(p => `<li>${p}</li>`).join('')}</ul></td>
          <td class="hrs">${m.hours}</td>
        </tr>`).join('');

    document.getElementById('outGrid').innerHTML = c.outcomes.map((o, i) => `
      <div class="out"><span class="no">${String(i + 1).padStart(2, '0')}</span><b>${o}</b></div>`).join('');

    document.getElementById('applyBtn').href = 'contact.html?course=' + encodeURIComponent(c.title);

    // 같은 직무 우선 추천, 부족하면 대표 과정으로 채움
    const others = COURSES.filter(x => x.id !== c.id);
    const rel = [...others.filter(x => x.cat === c.cat), ...others.filter(x => x.cat !== c.cat)].slice(0, 3);
    document.getElementById('moreGrid').innerHTML = rel.map(x => `
      <a class="mini" href="course.html#${x.id}" onclick="setTimeout(renderCourse,0)">
        <span class="cat">${CATS[x.cat]} · ${LEVELS[x.level]}</span>
        <h5>${x.title}</h5>
        <div class="m">${x.hours}</div>
      </a>`).join('');

    scrollTo(0, 0);
  }
  document.addEventListener('DOMContentLoaded', renderCourse);
  addEventListener('hashchange', renderCourse);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없습니다 — CoreNine AI</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;color:#0D1B2A;
  min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;
  background:
    radial-gradient(900px 500px at 88% -10%,rgba(11,185,133,.16) 0%,transparent 60%),
    radial-gradient(600px 380px at -6% 110%,rgba(201,242,78,.14) 0%,transparent 55%),
    linear-gradient(180deg,#F0FAF5 0%,#FFFFFF 100%);
  word-break:keep-all}
.wrap{padding:48px 24px;max-width:560px}
.sym{width:72px;height:72px;margin:0 auto 26px}
.code{font-size:15px;font-weight:800;letter-spacing:4px;color:#0BA678;margin-bottom:14px}
h1{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1.4;margin-bottom:14px}
p{font-size:16px;color:#41535F;line-height:1.7;margin-bottom:32px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a.btn{display:inline-block;padding:14px 28px;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;transition:.2s}
a.primary{background:linear-gradient(135deg,#0BA678,#0BB985);color:#fff;box-shadow:0 8px 20px rgba(11,166,120,.25)}
a.primary:hover{transform:translateY(-2px)}
a.ghost{border:1.5px solid #D4E4DC;color:#0D1B2A;background:#fff}
a.ghost:hover{border-color:#0BA678;color:#047857}
</style>
</head>
<body>
<div class="wrap">
  <svg class="sym" viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs><linearGradient id="cnArc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#047857"/><stop offset="1" stop-color="#0BB985"/>
    </linearGradient></defs>
    <g transform="translate(44,38)">
      <circle r="21" fill="none" stroke="url(#cnArc)" stroke-width="11"/>
      <path d="M 21 2 L 21 26" fill="none" stroke="#C9F24E" stroke-width="11" stroke-linecap="round"/>
      <circle r="9" fill="#0D1B2A"/>
    </g>
  </svg>
  <div class="code">404 NOT FOUND</div>
  <h1>찾으시는 페이지가 없습니다</h1>
  <p>주소가 바뀌었거나 삭제된 페이지입니다.<br>아래 버튼으로 이동해 주세요.</p>
  <div class="btns">
    <a class="btn primary" href="/">홈으로 가기</a>
    <a class="btn ghost" href="/contact.html">상담 문의</a>
  </div>
</div>
</body>
</html>
